<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galera da Zaga - Cadastro</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
    <header>
        <div class="logo">Galera da Zaga</div>
        <nav>
            <a href="index.html">Início</a>
            <a href="cadastro.html" class="active">Cadastro</a>
        </nav>
    </header>

    <main class="container">
        <div class="card form-container">
            <h2>Cadastre-se</h2>
            <p class="subtitle">Seja Zaga.</p>
            
            <form action="#" class="cadastro-form">
                <div class="avatar-upload">
                    <div class="avatar-preview">IMG</div>
                    <button type="button" class="btn btn-outline">Escolher Foto</button>
                </div>

                <div class="form-grid">
                    <div class="input-group">
                        <label>Nome Completo</label>
                        <input type="text" placeholder="Ex: Joaquim Bezerrinha" required>
                    </div>
                    <div class="input-group">
                        <label>E-mail Institucional</label>
                        <input type="email" placeholder="joaquim@gmai.com" required>
                    </div>
                    <div class="input-group">
                        <label>Data de Nascimento</label>
                        <input type="date" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Senha:</label>
                        <input type="password" placeholder="Digite sua senha:" required>
                    </div>
                <div class="input-group full-width">
                    <label>Um pouco sobre você</label>
                    <textarea rows="3" placeholder="Texto descritivo..." ></textarea>
                </div>

                <div class="form-actions">
                    <button type="reset" class="btn btn-outline">Limpar</button>
                    <button type="submit" class="btn btn-primary">Cadastre-se</button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
