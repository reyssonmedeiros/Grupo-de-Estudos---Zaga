<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galera da Zaga - Cadastro</title>
    <link rel="stylesheet" href="cadastro.css">
    <script src="validacoes.js" defer></script>
    <script src="formularios.js" defer></script>
</head>
<body>
    <header>
        <div class="logo">Galera da Zaga</div>
        <nav>
            <a href="index.html">Início</a>
            <a href="cadastro.html" class="active">Cadastro</a>
        </nav>
    </header>

    <main class="container">
        <div class="card form-container">
            <h2>Cadastre-se</h2>
            <p class="subtitle">Seja Zaga.</p>
            
            <form action="#" class="cadastro-form" id="formCadastro">
                <div class="avatar-upload">
                    <div class="avatar-preview">IMG</div>
                    <button type="button" class="btn btn-outline">Escolher Foto</button>
                </div>

                <div class="form-grid">
                    <div class="input-group">
                        <label for="nome">Nome Completo</label>
                        <input id="nome" type="text" placeholder="Ex: Joaquim Bezerrinha" required>
                        <span id="nomeErro" class="erro"></span>
                    </div>
                    <div class="input-group">
                        <label for="email">E-mail Institucional</label>
                        <input id="email" type="email" placeholder="joaquim@gmai.com" required>
                        <span id="emailErro" class="erro"></span>
                    </div>
                    <div class="input-group">
                        <label for="dataNascimento">Data de Nascimento</label>
                        <input id="dataNascimento" type="date" required>
                        <span id="dataNascimentoErro" class="erro"></span>
                    </div>
                    <div class="input-group">
                        <label for="senha">Senha:</label>
                        <input id="senha" type="password" placeholder="Digite sua senha:" required>
                        <span id="senhaSugestao" class="erro"></span>
                    </div>
                </div>

                <div class="input-group full-width">
                    <label for="bio">Um pouco sobre você</label>
                    <textarea id="bio" rows="3" placeholder="Texto descritivo..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="reset" class="btn btn-outline">Limpar</button>
                    <button type="submit" class="btn btn-primary">Cadastre-se</button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
