<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galera da Zaga - Login</title>
    <link rel="stylesheet" href="login.css">
    <script src="validacoes.js" defer></script>
    <script src="formularios.js" defer></script>
</head>
<body>

    <main class="login-page">

        <section class="left-side">

            <div class="left-content">

                <div class="brand">
                    <h1>Galera da Zaga</h1>

                    <nav>
                        <a href="index.html">Início</a>
                        <a href="cadastro.html">Cadastro</a>
                    </nav>
                </div>

                <div class="image-container">
                    <img src="AcademiadePlataoAristoteles.jpg" alt="Imagem de apresentação">
                </div>

            </div>

        </section>

        <section class="right-side">

            <div class="login-card">

                <div class="logo-login">GZ</div>

                <h2>Entrar</h2>

                <p class="subtitle">
                    Acesse sua conta para continuar.
                </p>

                <form action="aluno.html" id="formLogin">

                    <div class="input-group">
                        <label for="loginEmail">E-mail</label>
                        <input id="loginEmail" type="email">
                        <span id="loginEmailErro" class="erro"></span>
                    </div>

                    <div class="input-group">
                        <label for="loginSenha">Senha</label>
                        <input id="loginSenha" type="password">
                        <span id="loginSenhaErro" class="erro"></span>
                    </div>

                    <button class="btn-login">
                        Entrar
                    </button>

                </form>

            </div>

        </section>

    </main>

</body>
</html>
