<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galera da Zaga - Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <main class="login-page">

        <section class="left-side">

            <div class="left-content">

                <div class="brand">
                    <h1>Galera da Zaga</h1>

                    <nav>
                        <a href="index.html">Início</a>
                        <a href="cadastro.html">Cadastro</a>
                    </nav>
                </div>

                <div class="image-container">
                    <img src="socrates.jfif" alt="Imagem de apresentação">
                </div>

            </div>

        </section>

        <section class="right-side">

            <div class="login-card">

                <div class="logo-login">GZ</div>

                <h2>Entrar</h2>

                <p class="subtitle">
                    Acesse sua conta para continuar.
                </p>

                <form>

                    <div class="input-group">
                        <label>E-mail</label>
                        <input type="email">
                    </div>

                    <div class="input-group">
                        <label>Senha</label>
                        <input type="password">
                    </div>

                    <button class="btn-login">
                        Entrar
                    </button>

                </form>

            </div>

        </section>

    </main>

</body>
</html>
